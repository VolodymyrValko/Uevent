services:
  postgres:
    image: postgres:16-alpine
    container_name: uevent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-uevent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-uevent_secret}
      POSTGRES_DB: ${DB_NAME:-uevent_db}
    command: ["postgres", "-c", "log_min_messages=FATAL", "-c", "log_min_error_statement=FATAL"]
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-uevent} -d ${DB_NAME:-uevent_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uevent_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      NODE_NO_WARNINGS: "1"
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
        REACT_APP_STRIPE_PUBLISHABLE_KEY: ${REACT_APP_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID:-placeholder}
    container_name: uevent_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
